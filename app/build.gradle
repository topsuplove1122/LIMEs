plugins {
    id 'com.android.application'
}

android {
    namespace 'io.github.hiro.lime'
    compileSdk 35

    defaultConfig {
        minSdk 22
        targetSdk 35
        versionCode 116160
        versionName "1.28.5alpha"
        multiDexEnabled true

        proguardFiles += 'proguard-rules.pro'
        buildConfigField 'String', 'HOOK_TARGET_VERSION', '"141910383"'
    }

    // 【修正 1】這一段必須獨立出來，不能寫在 defaultConfig 裡面
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    signingConfigs {
        android {
            storeFile file('android.jks')
            storePassword 'android'
            keyAlias 'android'
            keyPassword 'android'
        }
        release {
            storeFile file('release.jks')
            storePassword System.getenv('STORE_PASSWORD')
            keyAlias System.getenv('KEY_ALIAS')
            keyPassword System.getenv('KEY_PASSWORD')
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.android
        }
        release {
            signingConfig signingConfigs.android
            if (file('release.jks').exists()) {
                signingConfig signingConfigs.release
            }
        }
    }

    // 【修正 2】物理防禦：如果還有舊的 Xposed 檔案沒刪掉，這段代碼會強行讓編譯器跳過它們
    sourceSets {
        main {
            java {
                // 排除所有你還沒改好的舊檔案，避免它們噴出 package de.robv 不存在的錯誤
                exclude '**/PhotoAddNotification.java'
                exclude '**/SendMuteMessage.java'
                exclude '**/EmbedOptions.java'
                exclude '**/AddRegistrationOptions.java'
                exclude '**/CheckHookTargetVersion.java'
                exclude '**/DarkColor.java'
                exclude '**/Removebutton.java'
                exclude '**/Disabled_Group_notification.java'
                exclude '**/SpoofUserAgent.java'
                exclude '**/PreventMarkAsRead.java'
                exclude '**/AgeCheckSkip.java'
                exclude '**/RingTone.java'
                exclude '**/WhiteToDark.java'
                exclude '**/test.java'
            }
        }
    }

    lint {
        checkReleaseBuilds false
        abortOnError false // 即使有警告也強行繼續
    }

    buildFeatures {
        buildConfig true
        compose false
    }

    dependenciesInfo {
        includeInApk false
        includeInBundle false
    }

    aaptOptions {
        additionalParameters '--allow-reserved-package-id', '--package-id', '0x64'
    }
}

dependencies {
    implementation 'androidx.fragment:fragment:1.8.6'
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'net.zetetic:android-database-sqlcipher:4.5.4'
    
    // libxposed API
    compileOnly 'io.github.libxposed:api:101.0.1'
    
    implementation 'org.mozilla:rhino:1.7.15'
    implementation 'androidx.constraintlayout:constraintlayout:2.2.1'
    implementation "androidx.work:work-runtime:2.10.0"
    implementation 'androidx.browser:browser:1.8.0'
    implementation 'com.squareup.okhttp3:okhttp:4.9.3'
    implementation 'androidx.documentfile:documentfile:1.1.0'
}

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs << "-Xlint:deprecation" << "-Xlint:unchecked"
}
